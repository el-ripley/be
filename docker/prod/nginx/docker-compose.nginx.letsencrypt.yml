version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-letsencrypt
    ports:
      - "80:80"
    volumes:
      - ./nginx.letsencrypt.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    networks:
      - ai_agent_network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot-letsencrypt
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    command: certonly --webroot -w /var/www/certbot --force-renewal --email admin@elripley.com -d elripley.com -d www.elripley.com -d be.elripley.com --agree-tos --no-eff-email
    networks:
      - ai_agent_network

networks:
  ai_agent_network:
    external: true
    
volumes:
  certbot-www:
  certbot-conf:
