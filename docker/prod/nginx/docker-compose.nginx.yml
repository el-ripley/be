version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-elripley
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    restart: unless-stopped
    depends_on:
      - certbot
    networks:
      - ai_agent_network

  certbot:
    image: certbot/certbot
    container_name: certbot-elripley
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email admin@elripley.com -d elripley.com -d www.elripley.com -d be.elripley.com --agree-tos --no-eff-email
    networks:
      - ai_agent_network

networks:
  ai_agent_network:
    external: true

volumes:
  certbot-www:
  certbot-conf:
