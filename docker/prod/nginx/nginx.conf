user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Set client body size to 10M (adjust as needed)
    client_max_body_size 10M;

    server {
        listen 80;
        server_name elripley.com *.elripley.com;

        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name elripley.com www.elripley.com;

        ssl_certificate     /etc/letsencrypt/live/elripley.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/elripley.com/privkey.pem;

        location / {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            proxy_pass http://fe-elripley:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name be.elripley.com;

        ssl_certificate     /etc/letsencrypt/live/elripley.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/elripley.com/privkey.pem;

        location / {
            # Allow larger file uploads for this location
            client_max_body_size 10M;

            proxy_pass http://ai-agent-app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.IO specific configuration
        location ~ ^/(socket\.io|api/socket\.io) {
            proxy_pass http://ai-agent-app:8000;
            proxy_http_version 1.1;
            
            # Essential headers for Socket.IO
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for Socket.IO
            proxy_read_timeout 86400s;
            proxy_connect_timeout 86400s;
            proxy_send_timeout 86400s;
            
            # Buffering settings for real-time communication
            proxy_buffering off;
            proxy_cache off;
        }
    }
} 