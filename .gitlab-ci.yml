stages:
  - lint
  - test
  - build
  - deploy

variables:
  GITLAB_REGISTRY: "registry.gitlab.com"
  BE_DOCKER_IMAGE: "ybds/ai-agent"
  BE_PIPELINE_NUMBER: "0.0.4"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  SSH_HOST: "143.198.215.19"
  SSH_PORT: "22"
  SSH_USER: "catsby"

lint:
  stage: lint
  image: python:3.11-slim
  cache:
    paths:
      - .pip-cache/
      - .venv/
  before_script:
    - pip install poetry
    - poetry config virtualenvs.in-project true
    - poetry install --with dev --no-root
  script:
    - poetry run black --check src/ tests/
    - poetry run isort --check src/ tests/
    - poetry run flake8 src/ tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  image: python:3.11-slim
  cache:
    paths:
      - .pip-cache/
      - .venv/
  before_script:
    - pip install poetry
    - poetry config virtualenvs.in-project true
    - poetry install --with dev --no-root
  script:
    - poetry run pytest tests/unit/ tests/integration/ -v --cov=src --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:
  stage: build
  image: docker:27.0.3
  services:
    - name: docker:27.0.3-dind
      alias: docker
  before_script:
    - echo $GITLAB_ACCESS_TOKEN | docker login $GITLAB_REGISTRY --username gitlab-ci-token --password-stdin
  script:
    - docker build -f Dockerfile -t $GITLAB_REGISTRY/$BE_DOCKER_IMAGE:$BE_PIPELINE_NUMBER .
    - docker push $GITLAB_REGISTRY/$BE_DOCKER_IMAGE:$BE_PIPELINE_NUMBER
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIV_KEY_ED25519" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "Host *" > ~/.ssh/config
    - echo "  StrictHostKeyChecking no" >> ~/.ssh/config
    - echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
    - echo "  IdentityFile ~/.ssh/id_ed25519" >> ~/.ssh/config
    - echo "  IdentitiesOnly yes" >> ~/.ssh/config
    - chmod 600 ~/.ssh/config
  script:
    - ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "
        cd /var/deploy &&
        echo $GITLAB_ACCESS_TOKEN | docker login $GITLAB_REGISTRY --username gitlab-ci-token --password-stdin &&
        export GITLAB_REGISTRY=$GITLAB_REGISTRY &&
        export BE_DOCKER_IMAGE=$BE_DOCKER_IMAGE &&
        export BE_PIPELINE_NUMBER=$BE_PIPELINE_NUMBER &&
        docker-compose -f docker-compose.be.yml pull &&
        docker-compose -f docker-compose.be.yml up -d --force-recreate &&
        echo 'Deployed version '${BE_PIPELINE_NUMBER} "
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - ybds-be
